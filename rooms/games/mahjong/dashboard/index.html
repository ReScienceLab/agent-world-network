<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeClaw Mahjong — Live</title>
<style>
  :root {
    --felt: #2d7a4f;
    --tile-bg: #f5f0e8;
    --text: #e8f4e8;
    --accent: #0047ab;
    --gold: #d4af37;
    --panel: #1a1f2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0d1117; color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--accent); padding: 8px 20px; display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 15px; }
  header .logo { font-size: 22px; }
  #conn-status { margin-left: auto; font-size: 12px; opacity: 0.8; }
  .main { flex: 1; display: grid; grid-template-columns: 1fr 300px; overflow: hidden; }
  /* Table */
  .table { background: var(--felt); display: grid; grid-template-rows: auto 1fr auto; grid-template-columns: auto 1fr auto; gap: 4px; padding: 12px; position: relative; }
  .player { background: rgba(0,0,0,0.25); border-radius: 8px; padding: 8px; }
  .player.north { grid-column: 2; grid-row: 1; }
  .player.south { grid-column: 2; grid-row: 3; }
  .player.west  { grid-column: 1; grid-row: 2; }
  .player.east  { grid-column: 3; grid-row: 2; }
  .player-name { font-size: 11px; font-weight: 600; color: var(--gold); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
  .seat-badge { background: rgba(0,71,171,0.6); padding: 1px 5px; border-radius: 3px; font-size: 10px; }
  .thinking { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4caf50; animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
  .tiles { display: flex; flex-wrap: wrap; gap: 2px; margin: 4px 0; font-size: 18px; line-height: 1; }
  .tile-back { opacity: 0.6; }
  .discard-label { font-size: 9px; opacity: 0.5; margin-top: 4px; }
  .discard-row { display: flex; flex-wrap: wrap; gap: 1px; font-size: 13px; }
  .melds-row { display: flex; gap: 4px; font-size: 14px; margin-top: 2px; }
  .meld-group { background: rgba(255,255,255,0.1); border-radius: 3px; padding: 1px 4px; font-size: 12px; }
  .score { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .last-discard { animation: flash 1s; }
  @keyframes flash { 0%,100%{background:none} 50%{background:rgba(255,200,0,.3)} }
  /* Center */
  .center { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .info-badge { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 8px 16px; text-align: center; }
  .info-badge .label { font-size: 10px; opacity: 0.6; }
  .info-badge .value { font-size: 18px; font-weight: bold; color: var(--gold); }
  /* Log panel */
  .log-panel { background: var(--panel); border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
  .log-header { padding: 10px 14px; font-size: 12px; font-weight: 600; color: var(--gold); border-bottom: 1px solid rgba(255,255,255,0.1); }
  .log-entries { flex: 1; overflow-y: auto; padding: 4px 0; font-size: 11px; font-family: monospace; }
  .log-entry { padding: 3px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); animation: fadeIn 0.2s; }
  @keyframes fadeIn { from{opacity:0;background:rgba(0,71,171,.15)} to{opacity:1} }
  .log-entry .route { color: #64b5f6; }
  .log-entry .payload { color: rgba(255,255,255,0.55); font-size: 10px; }
  .log-entry .ts { color: rgba(255,255,255,0.3); font-size: 9px; float: right; }
  /* Overlay */
  .overlay { display:none; position:absolute; inset:0; background:rgba(0,0,0,.65); align-items:center; justify-content:center; z-index:10; }
  .overlay.show { display:flex; }
  .overlay-card { background:var(--panel); border:2px solid var(--gold); border-radius:12px; padding:24px 40px; text-align:center; }
  .overlay-card .win { font-size:32px; color:var(--gold); }
  .overlay-card .pts { font-size:20px; margin-top:6px; }
  .overlay-card .yaku { font-size:12px; color:rgba(255,255,255,.6); margin-top:8px; }
</style>
</head>
<body>
<header>
  <span class="logo">🀄</span>
  <span>DeClaw Mahjong</span>
  <span id="conn-status">⚡ Connecting...</span>
</header>
<div class="main">
  <div class="table" id="table">
    <div class="player north" id="p-north">
      <div class="player-name"><span class="seat-badge">北 N</span> <span id="nm-north">等待加入...</span> <span id="th-north"></span></div>
      <div class="tiles" id="hd-north"></div>
      <div class="melds-row" id="ml-north"></div>
      <div class="discard-label">打出</div>
      <div class="discard-row" id="dc-north"></div>
      <div class="score" id="sc-north">25000</div>
    </div>
    <div class="player west" id="p-west">
      <div class="player-name"><span class="seat-badge">西 W</span> <span id="nm-west">等待加入...</span> <span id="th-west"></span></div>
      <div class="tiles" id="hd-west"></div>
      <div class="melds-row" id="ml-west"></div>
      <div class="discard-label">打出</div>
      <div class="discard-row" id="dc-west"></div>
      <div class="score" id="sc-west">25000</div>
    </div>
    <div class="center">
      <div class="info-badge"><div class="label">Round</div><div class="value" id="round">东1局</div></div>
      <div class="info-badge"><div class="label">Wall</div><div class="value" id="wall">—</div></div>
      <div id="dora" style="font-size:12px;opacity:.7"></div>
    </div>
    <div class="player east" id="p-east">
      <div class="player-name"><span class="seat-badge">东 E</span> <span id="nm-east">等待加入...</span> <span id="th-east"></span></div>
      <div class="tiles" id="hd-east"></div>
      <div class="melds-row" id="ml-east"></div>
      <div class="discard-label">打出</div>
      <div class="discard-row" id="dc-east"></div>
      <div class="score" id="sc-east">25000</div>
    </div>
    <div class="player south" id="p-south">
      <div class="player-name"><span class="seat-badge">南 S</span> <span id="nm-south">等待加入...</span> <span id="th-south"></span></div>
      <div class="tiles" id="hd-south"></div>
      <div class="melds-row" id="ml-south"></div>
      <div class="discard-label">打出</div>
      <div class="discard-row" id="dc-south"></div>
      <div class="score" id="sc-south">25000</div>
    </div>
    <div class="overlay" id="overlay">
      <div class="overlay-card">
        <div class="win" id="ov-win"></div>
        <div class="pts" id="ov-pts"></div>
        <div class="yaku" id="ov-yaku"></div>
      </div>
    </div>
  </div>
  <div class="log-panel">
    <div class="log-header">🔗 P2P Message Stream</div>
    <div class="log-entries" id="log"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
