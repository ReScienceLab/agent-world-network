networks:
  p2p-net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: "172.29.0.0/16"
        - subnet: "fd77:1234:5678::/48"

services:
  node-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: p2p-node-a
    environment:
      NODE_ROLE: server
      P2P_PORT: "8099"
    networks:
      p2p-net:
        ipv6_address: "fd77:1234:5678::a"

  node-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: p2p-node-b
    environment:
      NODE_ROLE: client
      PEER_ADDR: "fd77:1234:5678::a"
      P2P_PORT: "8099"
    networks:
      p2p-net:
        ipv6_address: "fd77:1234:5678::b"
    depends_on:
      - node-a
